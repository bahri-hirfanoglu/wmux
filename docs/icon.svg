<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#141a22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="2" y="2" width="508" height="508" rx="78" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- Green glow behind text -->
  <ellipse cx="256" cy="230" rx="200" ry="120" fill="rgba(0,255,65,0.06)"/>

  <!-- Terminal bracket left -->
  <text x="60" y="290" font-family="Consolas,'Courier New',monospace" font-size="160" font-weight="900" fill="#1a3a1f" filter="url(#glow)">></text>

  <!-- wmux text -->
  <text x="256" y="270" text-anchor="middle" font-family="Consolas,'Courier New',monospace" font-size="120" font-weight="900" fill="#00ff41" filter="url(#glow)">wmux</text>

  <!-- Underline accent -->
  <rect x="96" y="300" width="320" height="4" rx="2" fill="#00ff41" opacity="0.5"/>

  <!-- Tagline -->
  <text x="256" y="365" text-anchor="middle" font-family="Segoe UI,system-ui,sans-serif" font-size="32" fill="#8b949e" font-weight="500">tmux for Windows</text>

  <!-- Bottom terminal dots -->
  <circle cx="210" cy="420" r="10" fill="#f85149"/>
  <circle cx="256" cy="420" r="10" fill="#d29922"/>
  <circle cx="302" cy="420" r="10" fill="#3fb950"/>
</svg>
